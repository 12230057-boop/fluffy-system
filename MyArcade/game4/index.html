<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>マグマ脱出</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #111; color: #fff; margin: 0; padding-top: 30px; }
        .back-btn { background: #555; color: #fff; font-size: 14px; padding: 8px 15px; border: none; border-radius: 5px; }
        #game-screen { background: #222; width: 80%; height: 300px; margin: 20px auto; border: 3px solid #ff4500; position: relative; border-radius: 10px; overflow: hidden; }
        #player { font-size: 30px; position: absolute; left: 45%; bottom: 10px; transition: bottom 0.1s; }
        #lava { background: linear-gradient(transparent, #ff4500); width: 100%; position: absolute; bottom: 0; left: 0; transition: height 0.1s; }
        .tap-zone { background: #ff4500; color: white; width: 80%; padding: 20px; font-size: 24px; font-weight: bold; border-radius: 10px; border: none; }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='../index.html'">🏠 戻る</button>
    <h1>🌋 マグマ脱出</h1>
    <h2>スコア: <span id="score">0</span>m (最高: <span id="high">0</span>m)</h2>
    <div id="game-screen">
        <div id="lava" style="height: 0px;"></div>
        <div id="player">🏃</div>
    </div>
    <button class="tap-zone" onclick="jump()">連打して登れ！</button>
    <script>
        let pHeight = 10, lavaHeight = 0, score = 0, active = true;
        let high = localStorage.getItem('run_high') || 0; document.getElementById('high').innerText = high;
        
        let timer = setInterval(() => {
            if(!active) return;
            lavaHeight += 1.5; // マグマの上昇速度
            if(pHeight > 10) pHeight -= 1; // 重力で落ちる
            
            document.getElementById('player').style.bottom = pHeight + 'px';
            document.getElementById('lava').style.height = lavaHeight + 'px';
            
            if (lavaHeight >= pHeight) { active = false; alert(`ゲームオーバー！記録: ${score}m`); reset(); }
        }, 50);
        
        function jump() { 
            if(!active) return; 
            pHeight += 12; 
            
            // 【修正部分】ゲーム画面の高さ(300px)からプレイヤーのサイズ(約30px)を引いた「270px」を天井にします
            if (pHeight > 270) {
                pHeight = 270;
            }
            
            score = Math.max(score, Math.floor(pHeight/10)); 
            document.getElementById('score').innerText = score; 
        }
        
        function reset() { pHeight = 10; lavaHeight = 0; if(score > high) { high = score; localStorage.setItem('run_high', high); } score = 0; active = true; }
    </script>
</body>
</html>
