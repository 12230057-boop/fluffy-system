<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ・自作ゲームセンター</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #121212; color: #fff; padding: 15px; margin: 0; }
        h1 { font-size: 24px; margin-bottom: 5px; color: #00ffcc; }
        .subtitle { font-size: 13px; color: #aaa; margin-bottom: 20px; }
        .game-list { display: flex; flex-direction: column; gap: 12px; max-width: 450px; margin: 0 auto; }
        .game-card { display: flex; align-items: center; background: #1e1e1e; border-left: 5px solid #555; border-radius: 8px; padding: 15px; cursor: pointer; text-align: left; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .game-card:active { transform: scale(0.97); background: #252525; }
        .game-icon { font-size: 32px; margin-right: 15px; }
        .game-info { flex-grow: 1; }
        .game-title { font-size: 16px; font-weight: bold; margin: 0 0 4px 0; }
        .game-desc { font-size: 12px; color: #bbb; margin: 0; }
    </style>
</head>
<body>
    <h1> My Game Center</h1>
    <div class="subtitle">お気に入り登録してスマホでいつでも遊べる！</div>
    <div class="game-list">
        <div class="game-card" style="border-color: #d4af37;" onclick="location.href='game1/index.html'">
            <div class="game-icon">⚔️</div>
            <div class="game-info"><div class="game-title">無限・聖剣鍛造RPG</div><div class="game-desc">確率を乗り越えて最強の武器を作るインフレゲーム</div></div>
        </div>
        <div class="game-card" style="border-color: #ff4500;" onclick="location.href='game2/index.html'">
            <div class="game-icon">🎰</div>
            <div class="game-info"><div class="game-title">脳汁・無限スロット</div><div class="game-desc">コインを稼いで役を揃える、永遠に回せるスロット</div></div>
        </div>
        <div class="game-card" style="border-color: #4a6fa5;" onclick="location.href='game3/index.html'">
            <div class="game-icon">🏰</div>
            <div class="game-info"><div class="game-title">偽広告風・無限タワー</div><div class="game-desc">YouTube広告のアレ！数字を計算して階層を駆け上がる</div></div>
        </div>
        <div class="game-card" style="border-color: #ff5500;" onclick="location.href='game4/index.html'">
            <div class="game-icon">🌋</div>
            <div class="game-info"><div class="game-title">Volcano Run</div><div class="game-desc">画面を猛連打して、下から迫るマグマから上へ逃げろ！</div></div>
        </div>
        <div class="game-card" style="border-color: #00ffcc;" onclick="location.href='game5/index.html'">
            <div class="game-icon">🔐</div>
            <div class="game-info"><div class="game-title">Cyber Lock</div><div class="game-desc">一瞬だけ光るパネルの順番を記憶して解除せよ</div></div>
        </div>
        <div class="game-card" style="border-color: #ffcc00;" onclick="location.href='game6/index.html'">
            <div class="game-icon">🎲</div>
            <div class="game-info"><div class="game-title">100狙いチキンレース</div><div class="game-desc">数字を足して「100ぴったり」に近づけるハラハラゲーム</div></div>
        </div>
    </div>
</body>
</html>
